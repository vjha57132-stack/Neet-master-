<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEET Master</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f4f8fb}
header{background:linear-gradient(135deg,#00a86b,#1e88e5);color:white;padding:70px 20px;text-align:center}
section{padding:40px 20px;max-width:1100px;margin:auto}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.card{background:white;padding:20px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
footer{text-align:center;padding:20px;background:#222;color:white}
.btn{display:inline-block;background:white;color:#1e88e5;padding:10px 18px;border-radius:20px;text-decoration:none;font-weight:bold}
</style>
</head>
<body>
<header>
<h1>NEET Master</h1>
<p>Prepare smarter for NEET UG</p>
<a class="btn" href="#resources">Explore Resources</a>
</header>

<section id="resources">
<h2>Study Resources</h2>
<div class="cards">
<div class="card"><h3>Physics</h3><p>Notes, formulas and practice questions.</p></div>
<div class="card"><h3>Chemistry</h3><p>Organic, Inorganic and Physical Chemistry.</p></div>
<div class="card"><h3>Biology</h3><p>NCERT-focused Biology preparation.</p></div>
<div class="card"><h3>Mock Tests</h3><p>Full-length tests and analysis.</p></div>
</div>
</section>

<footer>© 2026 NEET Master</footer>
</body>
</html>
